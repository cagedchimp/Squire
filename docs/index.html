<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Squire — TTRPG Ruleset Lookup</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<style>
  :root {
    --bg: #14100c;
    --panel: #1f1913;
    --panel2: #2a2118;
    --border: #3d3122;
    --text: #e8ddc9;
    --dim: #a3937a;
    --accent: #d4a13f;
    --accent2: #8c3b2e;
    --good: #6fa35c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    display: flex; flex-direction: column; height: 100vh; height: 100dvh;
  }
  header {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 10px 16px; background: var(--panel);
    border-bottom: 2px solid var(--border);
    font-family: system-ui, sans-serif; font-size: 13px;
  }
  #brand { display: flex; align-items: center; gap: 9px; margin-right: 8px; }
  #brand img { width: 30px; height: 30px; display: block; }
  header h1 {
    font-family: Georgia, serif; font-size: 19px; margin: 0;
    color: var(--accent); letter-spacing: 2.5px; white-space: nowrap;
    font-variant: small-caps;
  }
  header h1 small {
    display: block; font-size: 9.5px; letter-spacing: 1.8px; color: var(--dim);
    font-variant: normal; font-family: system-ui, sans-serif;
    text-transform: uppercase; margin-top: -2px;
  }
  select, button, input[type=text] {
    background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; font-family: system-ui, sans-serif;
  }
  button { cursor: pointer; }
  button.primary { background: var(--accent); color: #14100c; font-weight: 700; border-color: var(--accent); }
  button.danger { background: var(--accent2); border-color: var(--accent2); }
  button:disabled { opacity: .45; cursor: default; }
  #status {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    color: var(--dim); font-size: 12.5px; max-width: 40%;
  }
  #statusDot { width: 10px; height: 10px; border-radius: 50%; background: #666; flex-shrink: 0; }
  #statusDot.listening { background: var(--good); box-shadow: 0 0 8px var(--good); }
  #statusDot.loading { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }

  main { flex: 1; overflow-y: auto; padding: 18px; }
  #cards { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  #empty { text-align: center; color: var(--dim); margin-top: 10vh; line-height: 1.7; }
  #empty .big { font-size: 42px; }
  #datasets { font-size: 11.5px; color: var(--dim); margin-top: 14px; }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-left: 4px solid var(--accent); border-radius: 8px;
    padding: 14px 18px; animation: slidein .3s ease;
  }
  .card.flash { animation: flash .8s ease; }
  @keyframes slidein { from { opacity: 0; transform: translateY(-8px); } }
  @keyframes flash { 0% { background: #3d3122; } }
  .card .head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .card h2 { margin: 0; font-size: 20px; color: var(--accent); }
  .badge {
    font-family: system-ui, sans-serif; font-size: 10.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px; padding: 2px 8px;
    border-radius: 10px; background: var(--panel2); color: var(--dim);
    border: 1px solid var(--border);
  }
  .badge.Spell { color: #b48ede; border-color: #4a3661; }
  .badge.Condition { color: #d98c8c; border-color: #5c3030; }
  .badge.Rule { color: #8fb6d9; border-color: #2f4a61; }
  .badge.Skill { color: #9ed98c; border-color: #3a5c30; }
  .badge.Monster { color: #d9a08c; border-color: #61402f; }
  .badge.Feat { color: #8cd9c5; border-color: #2f6152; }
  .badge.MagicItem { color: #d9c58c; border-color: #61552f; }
  .subtitle { color: var(--dim); font-style: italic; font-size: 13.5px; }
  .close { margin-left: auto; background: none; border: none; color: var(--dim); font-size: 16px; padding: 0 4px; }
  .meta {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 4px 16px; margin: 10px 0 4px; font-size: 13px;
    font-family: system-ui, sans-serif;
  }
  .meta b { color: var(--dim); font-weight: 600; }
  .body { font-size: 14.5px; line-height: 1.6; }
  .body p { margin: 8px 0; }
  .body h3, .body h4, .body h5 { color: var(--accent); margin: 12px 0 4px; }
  .body table { border-collapse: collapse; margin: 8px 0; font-size: 13px; font-family: system-ui, sans-serif; }
  .body td, .body th { border: 1px solid var(--border); padding: 4px 10px; }
  .body ul { margin: 6px 0; padding-left: 22px; }
  .body.clamp { max-height: 320px; overflow: hidden; position: relative; }
  .body.clamp::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
    background: linear-gradient(transparent, var(--panel));
  }
  .expand { font-size: 12px; margin-top: 6px; background: none; border: none; color: var(--accent); }

  footer {
    background: var(--panel); border-top: 2px solid var(--border);
    padding: 10px 16px; font-family: system-ui, sans-serif;
  }
  #transcript {
    max-width: 860px; margin: 0 auto 8px; color: var(--dim);
    font-size: 13px; font-style: italic; min-height: 18px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #transcript .latest { color: var(--text); }
  #simRow { max-width: 860px; margin: 0 auto; display: flex; gap: 8px; }
  #simText { flex: 1; min-width: 120px; }
</style>
</head>
<body>
<header>
  <div id="brand">
    <img src="logo.svg" alt="Squire logo">
    <h1>Squire<small>Ruleset Lookup</small></h1>
  </div>
  <button id="micBtn" class="primary" title="Listen to the room through your microphone">&#127908; Microphone</button>
  <button id="sysBtn" class="primary" title="Listen to a tab or your system audio (Discord, Zoom) — pick a source and check 'share audio'">&#128421; Tab / system audio</button>
  <select id="model" title="Whisper model (bigger = more accurate, slower). Downloads once, then cached.">
    <option value="tiny.en">tiny.en — fastest</option>
    <option value="base.en" selected>base.en — balanced</option>
    <option value="small.en">small.en — most accurate</option>
  </select>
  <button id="stopBtn" class="danger" disabled>&#9632; Stop</button>
  <button id="importBtn" title="Import a custom ruleset JSON (stored in this browser only)">&#128193; Import ruleset</button>
  <input type="file" id="importFile" accept=".json" multiple hidden>
  <div id="status"><div id="statusDot"></div><span id="statusText">loading…</span></div>
</header>

<main>
  <div id="cards">
    <div id="empty">
      <div class="big">&#128214;</div>
      <b>Waiting for rules to be mentioned…</b><br>
      Start the <b>Microphone</b> for table play, or <b>Tab / system audio</b>
      to listen to Discord or Zoom. Or try the test box below — type
      <i>“I cast fireball at the goblins”</i>.
      <div id="datasets"></div>
    </div>
  </div>
</main>

<footer>
  <div id="transcript"></div>
  <div id="simRow">
    <input type="text" id="simText" placeholder='Test without audio — e.g. "the beholder attacks" or "make a stealth check"'>
    <button id="simBtn">Simulate</button>
  </div>
</footer>

<script type="module" src="app.js"></script>
</body>
</html>
