<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TTRPG Ruleset Lookup</title>
<style>
  :root {
    --bg: #14100c;
    --panel: #1f1913;
    --panel2: #2a2118;
    --border: #3d3122;
    --text: #e8ddc9;
    --dim: #a3937a;
    --accent: #d4a13f;
    --accent2: #8c3b2e;
    --good: #6fa35c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 16px; background: var(--panel);
    border-bottom: 2px solid var(--border);
    font-family: system-ui, sans-serif; font-size: 13px;
  }
  header h1 {
    font-family: Georgia, serif; font-size: 18px; margin: 0 12px 0 0;
    color: var(--accent); letter-spacing: 1px; white-space: nowrap;
  }
  select, button, input[type=text] {
    background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; font-family: system-ui, sans-serif;
  }
  select { max-width: 320px; }
  button { cursor: pointer; }
  button.primary { background: var(--accent); color: #14100c; font-weight: 700; border-color: var(--accent); }
  button.danger { background: var(--accent2); border-color: var(--accent2); }
  button:disabled { opacity: .45; cursor: default; }
  #status {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    color: var(--dim); font-size: 12.5px;
  }
  #statusDot { width: 10px; height: 10px; border-radius: 50%; background: #666; }
  #statusDot.listening { background: var(--good); box-shadow: 0 0 8px var(--good); }
  #statusDot.loading { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }

  main { flex: 1; overflow-y: auto; padding: 18px; }
  #cards { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  #empty { text-align: center; color: var(--dim); margin-top: 12vh; line-height: 1.7; }
  #empty .big { font-size: 42px; }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-left: 4px solid var(--accent); border-radius: 8px;
    padding: 14px 18px; animation: slidein .3s ease;
  }
  .card.flash { animation: flash .8s ease; }
  @keyframes slidein { from { opacity: 0; transform: translateY(-8px); } }
  @keyframes flash { 0% { background: #3d3122; } }
  .card .head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .card h2 { margin: 0; font-size: 20px; color: var(--accent); }
  .badge {
    font-family: system-ui, sans-serif; font-size: 10.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px; padding: 2px 8px;
    border-radius: 10px; background: var(--panel2); color: var(--dim);
    border: 1px solid var(--border);
  }
  .badge.Spell { color: #b48ede; border-color: #4a3661; }
  .badge.Condition { color: #d98c8c; border-color: #5c3030; }
  .badge.Rule { color: #8fb6d9; border-color: #2f4a61; }
  .badge.Skill { color: #9ed98c; border-color: #3a5c30; }
  .badge["Magic Item"], .badge.MagicItem { color: #d9c58c; }
  .subtitle { color: var(--dim); font-style: italic; font-size: 13.5px; }
  .close { margin-left: auto; background: none; border: none; color: var(--dim); font-size: 16px; padding: 0 4px; }
  .meta {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 4px 16px; margin: 10px 0 4px; font-size: 13px;
    font-family: system-ui, sans-serif;
  }
  .meta b { color: var(--dim); font-weight: 600; }
  .body { font-size: 14.5px; line-height: 1.6; }
  .body p { margin: 8px 0; }
  .body h3, .body h4 { color: var(--accent); margin: 12px 0 4px; }
  .body table { border-collapse: collapse; margin: 8px 0; font-size: 13px; font-family: system-ui, sans-serif; }
  .body td, .body th { border: 1px solid var(--border); padding: 4px 10px; }
  .body ul { margin: 6px 0; padding-left: 22px; }
  .body.clamp { max-height: 320px; overflow: hidden; position: relative; }
  .body.clamp::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
    background: linear-gradient(transparent, var(--panel));
  }
  .expand { font-size: 12px; margin-top: 6px; background: none; border: none; color: var(--accent); }

  footer {
    background: var(--panel); border-top: 2px solid var(--border);
    padding: 10px 16px; font-family: system-ui, sans-serif;
  }
  #transcript {
    max-width: 860px; margin: 0 auto 8px; color: var(--dim);
    font-size: 13px; font-style: italic; min-height: 18px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #transcript .latest { color: var(--text); }
  #simRow { max-width: 860px; margin: 0 auto; display: flex; gap: 8px; }
  #simText { flex: 1; }
</style>
</head>
<body>
<header>
  <h1>&#9876; Ruleset Lookup</h1>
  <select id="device" title="Audio source"></select>
  <select id="model" title="Whisper model (bigger = more accurate, slower)">
    <option value="tiny.en">tiny.en — fastest</option>
    <option value="base.en" selected>base.en — balanced</option>
    <option value="small.en">small.en — most accurate</option>
  </select>
  <button id="startBtn" class="primary">&#9679; Start listening</button>
  <button id="stopBtn" class="danger" disabled>&#9632; Stop</button>
  <div id="status"><div id="statusDot"></div><span id="statusText">connecting…</span></div>
</header>

<main>
  <div id="cards">
    <div id="empty">
      <div class="big">&#128214;</div>
      <b>Waiting for rules to be mentioned…</b><br>
      Pick an audio source above and press <b>Start listening</b>, or try the
      test box below — type <i>“I cast fireball at the goblins”</i>.
    </div>
  </div>
</main>

<footer>
  <div id="transcript"></div>
  <div id="simRow">
    <input type="text" id="simText" placeholder='Test without audio — type what a player might say, e.g. "make a stealth check" or "you are grappled"'>
    <button id="simBtn">Simulate</button>
  </div>
</footer>

<script>
const $ = id => document.getElementById(id);
const cardsEl = $('cards'), emptyEl = $('empty');
let transcriptLines = [];

// ---------- websocket ----------
let ws;
function connect() {
  ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws');
  ws.onmessage = e => handle(JSON.parse(e.data));
  ws.onclose = () => { setStatus('idle', 'disconnected — retrying…'); setTimeout(connect, 1500); };
}
function handle(msg) {
  if (msg.type === 'status') setStatus(msg.status, msg.detail);
  else if (msg.type === 'transcript') addTranscript(msg.text);
  else if (msg.type === 'card') addCard(msg.card);
  else if (msg.type === 'error') setStatus('idle', 'Error: ' + msg.message);
}
function setStatus(status, detail) {
  $('statusDot').className = status;
  $('statusText').textContent = detail || status;
  $('startBtn').disabled = (status !== 'idle');
  $('stopBtn').disabled = (status === 'idle');
}

// ---------- transcript ticker ----------
function addTranscript(text) {
  transcriptLines.push(text);
  transcriptLines = transcriptLines.slice(-4);
  $('transcript').innerHTML = transcriptLines
    .map((t, i) => i === transcriptLines.length - 1
      ? '<span class="latest">&#127908; ' + esc(t) + '</span>' : esc(t))
    .join('  &middot;  ');
}

// ---------- cards ----------
function addCard(card) {
  emptyEl.style.display = 'none';
  const existing = document.getElementById('card-' + cssId(card.id));
  if (existing) {
    cardsEl.prepend(existing);
    existing.classList.remove('flash'); void existing.offsetWidth;
    existing.classList.add('flash');
    return;
  }
  const el = document.createElement('div');
  el.className = 'card';
  el.id = 'card-' + cssId(card.id);
  let metaHtml = '';
  const metaKeys = Object.keys(card.meta || {});
  if (metaKeys.length) {
    metaHtml = '<div class="meta">' + metaKeys.map(k =>
      '<div><b>' + esc(k) + ':</b> ' + esc(card.meta[k]) + '</div>').join('') + '</div>';
  }
  const bodyHtml = (card.body || []).map(renderMd).join('');
  el.innerHTML =
    '<div class="head">' +
      '<span class="badge ' + esc(card.category.replace(/\s/g, '')) + '">' + esc(card.category) + '</span>' +
      '<h2>' + esc(card.name) + '</h2>' +
      (card.subtitle ? '<span class="subtitle">' + esc(card.subtitle) + '</span>' : '') +
      '<button class="close" title="Dismiss">&#10005;</button>' +
    '</div>' + metaHtml +
    '<div class="body">' + bodyHtml + '</div>';
  el.querySelector('.close').onclick = () => el.remove();
  const body = el.querySelector('.body');
  cardsEl.prepend(el);
  if (body.scrollHeight > 360) {
    body.classList.add('clamp');
    const btn = document.createElement('button');
    btn.className = 'expand'; btn.textContent = '▼ Show full text';
    btn.onclick = () => {
      const clamped = body.classList.toggle('clamp');
      btn.textContent = clamped ? '▼ Show full text' : '▲ Collapse';
    };
    el.appendChild(btn);
  }
  while (cardsEl.querySelectorAll('.card').length > 30)
    cardsEl.querySelector('.card:last-of-type').remove();
}

// ---------- tiny markdown renderer (headers, bold, italics, lists, tables) ----------
function renderMd(text) {
  const lines = String(text).split('\n');
  let html = '', para = [], list = null, table = null;
  const flushPara = () => { if (para.length) { html += '<p>' + inline(para.join(' ')) + '</p>'; para = []; } };
  const flushList = () => { if (list) { html += '<ul>' + list.map(li => '<li>' + inline(li) + '</li>').join('') + '</ul>'; list = null; } };
  const flushTable = () => {
    if (!table) return;
    html += '<table>' + table.filter(r => !/^[\s|:-]+$/.test(r)).map((r, i) => {
      const cells = r.split('|').map(c => c.trim()).filter((c, j, a) => !(j === 0 && c === '') && !(j === a.length - 1 && c === ''));
      const tag = i === 0 ? 'th' : 'td';
      return '<tr>' + cells.map(c => '<' + tag + '>' + inline(c) + '</' + tag + '>').join('') + '</tr>';
    }).join('') + '</table>';
    table = null;
  };
  for (const raw of lines) {
    const line = raw.trimEnd();
    if (!line.trim()) { flushPara(); flushList(); flushTable(); continue; }
    const h = line.match(/^(#{1,6})\s+(.*)/);
    if (h) { flushPara(); flushList(); flushTable(); html += '<h' + Math.min(h[1].length + 2, 5) + '>' + inline(h[2]) + '</h' + Math.min(h[1].length + 2, 5) + '>'; continue; }
    if (/^[-*]\s+/.test(line)) { flushPara(); flushTable(); (list = list || []).push(line.replace(/^[-*]\s+/, '')); continue; }
    if (line.includes('|') && line.trim().startsWith('|')) { flushPara(); flushList(); (table = table || []).push(line); continue; }
    flushList(); flushTable(); para.push(line);
  }
  flushPara(); flushList(); flushTable();
  return html;
}
function inline(s) {
  return esc(s)
    .replace(/\*\*\*(.+?)\*\*\*/g, '<b><i>$1</i></b>')
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.+?)\*/g, '<i>$1</i>')
    .replace(/_(.+?)_/g, '<i>$1</i>');
}
function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
function cssId(s) { return s.replace(/[^a-zA-Z0-9_-]/g, '_'); }

// ---------- controls ----------
async function loadDevices() {
  const sel = $('device');
  try {
    const res = await fetch('/api/devices');
    const data = await res.json();
    sel.innerHTML = '';
    if (!data.devices.length) {
      sel.innerHTML = '<option value="">No audio devices found</option>';
      return;
    }
    for (const d of data.devices) {
      const opt = document.createElement('option');
      opt.value = d.index;
      opt.textContent = d.label;
      sel.appendChild(opt);
    }
  } catch (e) {
    sel.innerHTML = '<option value="">Device list failed — see console</option>';
  }
}
$('startBtn').onclick = async () => {
  const device_index = parseInt($('device').value, 10);
  if (isNaN(device_index)) return alert('Pick an audio source first.');
  await fetch('/api/start', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({device_index, model: $('model').value}),
  });
};
$('stopBtn').onclick = () => fetch('/api/stop', {method: 'POST'});
async function simulate() {
  const text = $('simText').value.trim();
  if (!text) return;
  $('simText').value = '';
  await fetch('/api/simulate', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text}),
  });
}
$('simBtn').onclick = simulate;
$('simText').addEventListener('keydown', e => { if (e.key === 'Enter') simulate(); });

connect();
loadDevices();
</script>
</body>
</html>
